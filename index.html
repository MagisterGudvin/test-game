<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>САМОСБОР — Текстовый квест</title>
<link rel="preload" href="assets/fonts/RubikWetPaint-Regular.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="assets/fonts/Pangolin-Regular.ttf" as="font" type="font/ttf" crossorigin>
<script src="https://yandex.ru/games/sdk/v2"></script>
<style>
  .game-icon {
    display: inline-block;
    width: 1em; height: 1em;
    vertical-align: -0.15em;
    background-color: currentColor;
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    flex-shrink: 0;
  }

  @font-face {
    font-family: 'Rubik Wet Paint';
    src: url('assets/fonts/RubikWetPaint-Regular.ttf') format('truetype');
    font-display: block;
  }
  @font-face {
    font-family: 'Pangolin';
    src: url('assets/fonts/Pangolin-Regular.ttf') format('truetype');
    font-display: block;
  }

  :root {
    --bg: #08080c;
    --panel: #101018;
    --border: #2a2636;
    --text: #c4bcd0;
    --text-dim: #6a6478;
    --accent: #6b2fb3;
    --accent-glow: #b14fff;
    --success: #3a6e5e;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  /* === п.1.6.2.7: запрет выделения, контекстного меню и подсветки тапа === */
  html, body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    overscroll-behavior: none;
  }
  img, .game-icon {
    -webkit-user-drag: none;
    user-drag: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pangolin', monospace;
    min-height: 100vh;
    overflow: hidden;
  }

  #menu-screen {
    position: fixed; inset:0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #160c26 0%, var(--bg) 70%);
    transition: opacity .8s;
    padding: 1rem;
  }
  #menu-screen.hidden { opacity:0; pointer-events:none; }

  #menu-screen h1 {
    font-family: 'Rubik Wet Paint', cursive;
    font-size: clamp(3rem, 10vw, 7rem);
    color: var(--accent-glow);
    text-shadow: 0 0 40px rgba(177,79,255,.5), 0 0 80px rgba(107,47,179,.35);
    letter-spacing: .12em;
    animation: flicker 5s infinite;
    text-align: center;
  }
  #menu-screen p {
    color: var(--text-dim);
    margin: 1rem 0 2.5rem;
    font-size: 1.1rem;
    text-align: center;
    max-width: 460px;
    line-height: 1.6;
  }
  #menu-screen button {
    font-family: 'Rubik Wet Paint', cursive;
    font-size: 1.6rem;
    padding: .7rem 3rem;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    letter-spacing: .1em;
    transition: transform .2s, box-shadow .2s;
  }
  #menu-screen button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(177,79,255,.45);
  }

  @keyframes flicker {
    0%,100%{ opacity:1 }
    92%{ opacity:1 }
    93%{ opacity:.4 }
    94%{ opacity:1 }
    96%{ opacity:.6 }
    97%{ opacity:1 }
  }

  /* === Спокойное «поглощение туманом» вместо скримера === */
  #flash {
    position: fixed; inset:0; z-index: 300;
    pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center, rgba(150,60,230,0) 0%, rgba(20,5,35,0) 80%);
    transition: opacity 1.3s ease;
  }
  #flash.active {
    opacity: 1;
    background: radial-gradient(ellipse at center, rgba(150,60,230,.5) 0%, rgba(16,5,30,.96) 80%);
  }

  #end-screen {
    position: fixed; inset:0; z-index: 200;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(8,6,14,.96);
    padding: 1rem;
  }
  #end-screen.active { display:flex; }
  #end-screen h2 {
    font-family: 'Rubik Wet Paint', cursive;
    font-size: clamp(2.2rem, 8vw, 3.5rem);
    text-align: center;
    margin-bottom: 1rem;
  }
  #end-screen p { color: var(--text-dim); margin-bottom: 2rem; font-size: 1.1rem; text-align:center; max-width:420px; }
  #end-screen button {
    font-family: 'Rubik Wet Paint', cursive;
    font-size: 1.3rem;
    padding: .6rem 2.5rem;
    background: var(--accent);
    color:#fff; border:none; cursor:pointer;
    letter-spacing: .08em;
  }

  #game {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  #game.active { display:flex; }

  #hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .6rem 1.2rem;
    background: #0c0a12;
    border-bottom: 1px solid var(--border);
    font-size: .85rem;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: .4rem;
  }
  #hud .noise-bar {
    display: flex; align-items: center; gap: .5rem;
  }
  #hud .noise-bar .bar {
    width: 120px; height: 8px;
    background: #222; border-radius: 4px; overflow: hidden;
  }
  #hud .noise-bar .bar .fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #4a0a8a, #b14fff);
    transition: width .4s;
  }
  #timer-display { font-family: 'Rubik Wet Paint', cursive; font-size: 1.3rem; color: var(--accent-glow); }
  #mute-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 1.2rem; padding: 0 .2rem;
    line-height: 1; opacity: .6; transition: opacity .2s;
  }
  #mute-btn:hover { opacity: 1; }
  #inventory-count { color: var(--text-dim); }

  #scene-area {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }

  #room-bg {
    height: 40%; min-height: 160px;
    background-color: #0e0c12;
    background-size: cover; background-position: bottom;
    position: relative;
    border-bottom: 1px solid var(--border);
    transition: background-image .5s;
    display: flex; align-items: center; justify-content: center;
  }
  #room-bg .room-label {
    font-family: 'Rubik Wet Paint', cursive;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: rgba(196,188,208,.25);
    text-transform: uppercase;
    letter-spacing: .3em;
    pointer-events: none;
  }
  #room-bg::before {
    content:''; position: absolute; inset:0; z-index: 1;
    background: rgba(20,8,36,.45);
    pointer-events: none;
  }
  #room-bg::after {
    content:''; position: absolute; inset:0; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,4,16,.6) 100%);
    pointer-events: none;
  }
  #room-bg .room-label { z-index: 3; }

  #scene-text {
    padding: 1rem 1.4rem; flex: 1; overflow-y: auto;
    line-height: 1.75; font-size: 1rem; color: var(--text);
    scrollbar-width: thin; scrollbar-color: #333 transparent;
  }
  #scene-text .event { color: #b9a7e6; font-style: italic; }
  #scene-text .danger { color: var(--accent-glow); }

  #actions {
    padding: .8rem 1rem; display: flex; flex-wrap: wrap; gap: .5rem;
    background: #0c0a12; border-top: 1px solid var(--border); flex-shrink: 0;

  .fade-in { animation: fadeIn .6s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

<div id="menu-screen">

<div id="flash"></div>

  </div>

    <div id="scene-text"></div>
  </div>

  <div id="inventory-panel"></div>

<script>
// ============================================================
//  YANDEX GAMES SDK + Game Ready API
// ============================================================
let ysdk = null;
const bl = (navigator.language || 'ru').slice(0, 2);
let lang = bl === 'ru' ? 'ru' : 'en';

async function initYSDK() {
  try {
    ysdk = await YaGames.init();
    const env = ysdk.environment;
    const sdkLang = (env.i18n && env.i18n.lang) ? env.i18n.lang.slice(0, 2) : null;
    if (sdkLang) lang = sdkLang === 'ru' ? 'ru' : 'en';
    console.log('Yandex SDK ready, lang:', lang);
  } catch(e) {
    console.warn('Yandex SDK not available, using browser lang:', lang);
  }
}

// Game Ready API: сообщаем платформе, что игра загружена
function notifyGameReady() {
  try { ysdk && ysdk.features && ysdk.features.LoadingAPI && ysdk.features.LoadingAPI.ready(); }
  catch(e) { console.warn('LoadingAPI.ready error:', e); }
}
// Gameplay API: старт/стоп активного игрового процесса
function gameplayStart() {
  try { ysdk && ysdk.features && ysdk.features.GameplayAPI && ysdk.features.GameplayAPI.start(); }
  catch(e) {}
}
function gameplayStop() {
  try { ysdk && ysdk.features && ysdk.features.GameplayAPI && ysdk.features.GameplayAPI.stop(); }
  catch(e) {}
}

let muted = false;
function toggleMute() {
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted ? 0 : 1;
  document.getElementById('mute-btn').innerHTML = muted ? icon('sound-off') : icon('sound-on');
}

// Пауза/возобновление: останавливает игровой цикл и ВЕСЬ звук
function pauseGame() {
  if (state) state.paused = true;
  suspendAudio();
  gameplayStop();
}
function resumeGame() {
  if (state) state.paused = false;
  if (state && !state.dead && !state.escaped) gameplayStart();
  resumeAudio();
}

function showInterstitialAd() {
  if (!ysdk) return Promise.resolve();
  pauseGame();
  return new Promise(resolve => {
    ysdk.adv.showFullscreenAdv({
      callbacks: {
        onClose: () => { resumeGame(); resolve(); },
        onError: (e) => { console.warn('Ad error:', e); resumeGame(); resolve(); },
      }
    });
  });
}

function showRewardedAd(onRewarded) {
  if (!ysdk) { onRewarded(); return; }
  pauseGame();
  ysdk.adv.showRewardedVideo({
    callbacks: {
      onRewarded: () => { onRewarded(); },
      onClose:    () => { resumeGame(); },
      onError:    (e) => { console.warn('Rewarded ad error:', e); resumeGame(); },
    }
  });
}

async function showLeaderboard() {
  if (!ysdk) { console.warn('Leaderboard: SDK not available'); return; }
  try {
    const lb = await ysdk.getLeaderboards();
    lb.showLeaderboardNativePopup({
      leaderboardName: 'bestEscapeTimeOne',
      invertSortOrder: false,
      quantityTop: 10,
      quantityAround: 3,
      showUser: true,
    });
  } catch(e) { console.warn('Leaderboard popup error:', e); }
}

async function submitLeaderboard(seconds) {
  if (!ysdk) return;
  try {
    const lb = await ysdk.getLeaderboards();
    // Яндекс: больше = лучше. Инвертируем: (300 - elapsed) → быстрее = выше
    await lb.setLeaderboardScore('bestEscapeTimeOne', Math.max(0, 300 - seconds));
  } catch(e) { console.warn('Leaderboard error:', e); }
}

async function savePlayerBestTime(seconds) {
  if (!ysdk) return;
  try {
    const player = await ysdk.getPlayer({ scopes: false });
    const data = await player.getData(['bestTime']);
    const current = data.bestTime || Infinity;
    if (seconds < current) await player.setData({ bestTime: seconds });
  } catch(e) { console.warn('Player data error:', e); }
}

// ============================================================
//  ЗВУК — Web Audio API
//  Весь звук идёт через AudioContext (без HTMLAudioElement),
//  чтобы:
//   - не появлялся системный медиаплеер (п.1.6.2.5);
//   - мгновенно глушить/ставить на паузу при сворачивании,
//     смене вкладки и показе рекламы (п.1.3, п.4.7).
// ============================================================
let audioCtx = null;
let masterGain = null;
const audioBuffers = {};
let bgSource = null;
let ambientInterval = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 1;
    masterGain.connect(audioCtx.destination);
  }
}

async function loadSoundAssets() {
  ensureAudio();
  await Promise.all(Object.entries(SOUND_ASSETS).map(async ([key, url]) => {
    if (!url) return;
    try {
      const res = await fetch(url);
      const arr = await res.arrayBuffer();
      audioBuffers[key] = await audioCtx.decodeAudioData(arr);
    } catch(e) { /* отсутствует — будет синтез */ }
  }));
}

// Пауза/возобновление всего звука разом
function suspendAudio() {
  if (audioCtx && audioCtx.state === 'running') audioCtx.suspend().catch(()=>{});
}
function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended' && !muted && !document.hidden) {
    audioCtx.resume().catch(()=>{});
  }
}

function playAsset(key, maxMs, volume) {
  if (document.hidden) return;
  ensureAudio();
  const buf = audioBuffers[key];
  if (buf) {
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.value = volume !== undefined ? volume : 0.4;
    src.connect(g); g.connect(masterGain);
    src.start();
    if (maxMs) setTimeout(() => { try { src.stop(); } catch(e){} }, maxMs);
    return;
  }
  synthSound(key, volume);
}

function synthSound(type, volume) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(masterGain);
  const v = volume !== undefined ? volume : 1;
  const now = audioCtx.currentTime;
  switch(type) {
    case 'doorOpen':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(120,now);
      osc.frequency.linearRampToValueAtTime(60,now+.4);
      gain.gain.setValueAtTime(.07*v,now); gain.gain.linearRampToValueAtTime(0,now+.5);
      osc.start(now); osc.stop(now+.5); break;
    case 'doorLocked':
      osc.type='square'; osc.frequency.setValueAtTime(200,now);
      gain.gain.setValueAtTime(.06*v,now); gain.gain.linearRampToValueAtTime(0,now+.15);
      osc.start(now); osc.stop(now+.15);
      setTimeout(()=>{ ensureAudio(); const o2=audioCtx.createOscillator(); const g2=audioCtx.createGain();
        o2.connect(g2);g2.connect(masterGain);o2.type='square';o2.frequency.value=160;
        g2.gain.setValueAtTime(.06*v,audioCtx.currentTime);g2.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.15);
        o2.start();o2.stop(audioCtx.currentTime+.15);},180); break;
    case 'itemPickup':
      osc.type='sine'; osc.frequency.setValueAtTime(600,now);
      osc.frequency.linearRampToValueAtTime(900,now+.12);
      gain.gain.setValueAtTime(.05*v,now); gain.gain.linearRampToValueAtTime(0,now+.2);
      osc.start(now); osc.stop(now+.2); break;
    case 'footsteps':
      osc.type='triangle'; osc.frequency.value=80;
      gain.gain.setValueAtTime(.05*v,now); gain.gain.linearRampToValueAtTime(0,now+.1);
      osc.start(now); osc.stop(now+.1); break;
    case 'creak':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(300,now);
      osc.frequency.linearRampToValueAtTime(150,now+.6);
      gain.gain.setValueAtTime(.05*v,now); gain.gain.linearRampToValueAtTime(0,now+.7);
      osc.start(now); osc.stop(now+.7); break;
    case 'collapse':
      // Спокойный низкий «нарастающий» гул поглощения туманом (не скример)
      osc.type='sine'; osc.frequency.setValueAtTime(160,now);
      osc.frequency.exponentialRampToValueAtTime(40,now+1.3);
      gain.gain.setValueAtTime(.0001,now);
      gain.gain.exponentialRampToValueAtTime(.12*v,now+.5);
      gain.gain.exponentialRampToValueAtTime(.0001,now+1.3);
      osc.start(now); osc.stop(now+1.35); break;
    case 'escape':
      osc.type='sine'; osc.frequency.setValueAtTime(400,now);
      osc.frequency.linearRampToValueAtTime(800,now+.3);
      gain.gain.setValueAtTime(.07*v,now); gain.gain.linearRampToValueAtTime(0,now+.5);
      osc.start(now); osc.stop(now+.5); break;
    default:
      osc.type='sine'; osc.frequency.value=220;
      gain.gain.setValueAtTime(.04*v,now); gain.gain.linearRampToValueAtTime(0,now+.2);
      osc.start(now); osc.stop(now+.2);
  }
}

function startAmbient() {
  ensureAudio();
  const buf = audioBuffers['bgMusic'];
  if (buf) {
    const g = audioCtx.createGain(); g.gain.value = 0.3; g.connect(masterGain);
    bgSource = audioCtx.createBufferSource();
    bgSource.buffer = buf; bgSource.loop = true;
    bgSource.connect(g); bgSource.start();
    return;
  }
  // Синтезированный фон, если файла нет
  ambientInterval = setInterval(()=>{
    if (state && (state.dead || state.escaped || state.paused)) return;
    ensureAudio(); const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
    o.connect(g);g.connect(masterGain);o.type='sine';o.frequency.value=45+Math.random()*15;
    const n=audioCtx.currentTime;g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.25,n+1);
    g.gain.linearRampToValueAtTime(0,n+3);o.start(n);o.stop(n+3);
  },4000);
}

function stopAmbient() {
  if (bgSource) { try { bgSource.stop(); } catch(e){} bgSource = null; }
  if (ambientInterval) { clearInterval(ambientInterval); ambientInterval = null; }
}

// ============================================================
//  СОСТОЯНИЕ
// ============================================================
let state = {};
function freshState() {
  return {
    room:'bedroom', inventory:[], noise:0,
    grannyRoom:'hallway', grannyAlert:0,
    timeLeft:300, paused:false,
    basementSearched:false, atticSearched:false, bathroomSearched:false,
    garageDoorOpen:false, frontDoorUnlocked:false,
    escaped:false, dead:false, moves:0,
  };
}

// ============================================================
//  НАВИГАЦИЯ КОМНАТ
// ============================================================
const ROOM_EXITS = {
  bedroom:  { hallway: 'hallway' },
  hallway:  { bedroom:'bedroom', kitchen:'kitchen', living:'living', bathroom:'bathroom', attic:'attic', basement:'basement' },
  kitchen:  { hallway:'hallway', garage:'garage' },
  living:   { hallway:'hallway' },
  bathroom: { hallway:'hallway' },
  attic:    { hallway:'hallFromAttic' },
  basement: { hallway:'hallFromBasement' },
  garage:   { kitchen:'backToKitchen' },
};

// ============================================================
//  ДЕЙСТВИЯ В КОМНАТАХ
// ============================================================
function getRoomActions(room) {
  const actions = [];
  const s = state;
  const has = (k) => s.inventory.includes(k);

  switch(room) {
    case 'bedroom':
      if (!has('screwdriver')) actions.push({ text: t('actSearchWardrobe'), action:()=>{
        addItem('screwdriver'); setText(t('actFoundScrewdriver'),'event'); addNoise(8);
      }});
      break;
    case 'kitchen':
      if (!has('knife')) actions.push({ text: t('actTakeKnife'), action:()=>{
        addItem('knife'); setText(t('actFoundKnife'),'event'); addNoise(12);
      }});
      if (!has('basementKey')) actions.push({ text: t('actSearchDrawers'), action:()=>{
        addItem('basementKey'); setText(t('actFoundBasementKey'),'event'); addNoise(15);
      }});
      break;
    case 'bathroom':
      if (!s.bathroomSearched) actions.push({ text: t('actLookBath'), action:()=>{
        s.bathroomSearched=true;
        if (!has('code1')) { addItem('code1'); setText(t('actFoundCode1'),'event'); }
        addNoise(6);
      }});
      if (has('knife') && !has('atticKey')) actions.push({ text: t('actCutPanel'), action:()=>{
        addItem('atticKey'); setText(t('actFoundAtticKey'),'event'); addNoise(20);
      }});
      break;
    case 'attic':
      if (!has('atticKey')) {
        actions.push({ text: t('actDoorLocked'), action:()=>{
          playAsset('doorLocked'); setText('<span class="danger">'+t('actNeedKey')+'</span>');
        }});
      } else {
        if (!s.atticSearched) actions.push({ text: t('actSearchBoxes'), action:()=>{
          s.atticSearched=true; addItem('code2'); setText(t('actFoundCode2'),'event'); addNoise(15);
        }});
        if (!has('pliers')) actions.push({ text: t('actTakePliers'), action:()=>{
          addItem('pliers'); setText(t('actFoundPliers'),'event'); addNoise(5);
        }});
      }
      break;
    case 'basement':
      if (!has('basementKey')) {
        actions.push({ text: t('actDoorLocked'), action:()=>{
          playAsset('doorLocked'); setText('<span class="danger">'+t('actNeedKey')+'</span>');
        }});
      } else {
        if (!s.basementSearched) actions.push({ text: t('actSearchWorkbench'), action:()=>{
          s.basementSearched=true; addItem('code3');
          const hasAll = has('code1') && has('code2');
          setText(hasAll ? t('actFoundCode3All') : t('actFoundCode3Part'), 'event');
          addNoise(12);
        }});
        if (has('screwdriver') && !has('frontKey')) actions.push({ text: t('actOpenPanel'), action:()=>{
          addItem('frontKey'); setText(t('actFoundFrontKey'),'event'); addNoise(20);
        }});
      }
      break;
    case 'living': {
      const hasKeys = has('frontKey') && has('pliers');
      const hasCode = has('code1') && has('code2') && has('code3');
      if (!s.frontDoorUnlocked) {
        actions.push({ text: t('actExamineDoor'), action:()=>{
          const k = has('frontKey') ? '✅' : '❌';
          const p = has('pliers') ? '✅' : '❌';
          const c = hasCode ? '✅' : '❌';
          setText(t('actDoorStatus')(k,p,c));
        }});
      }
      if (hasKeys && hasCode && !s.frontDoorUnlocked) {
        actions.push({ text: t('actUnlockAll'), cls:'item-action', action:()=>{
          s.frontDoorUnlocked=true; addNoise(35);
          setText(t('actUnlockedMsg')); playAsset('doorOpen');
          s.grannyRoom='hallway';
        }});
      }
      if (s.frontDoorUnlocked) actions.push({ text: t('actRun'), cls:'item-action', action:()=>{
        playAsset('escape'); winGame();
      }});
    } break;
    case 'garage': {
      const hasCode = has('code1') && has('code2') && has('code3');
      if (!s.garageDoorOpen) {
        if (hasCode) actions.push({ text: t('actEnterCode'), cls:'item-action', action:()=>{
          s.garageDoorOpen=true; addNoise(40);
          setText(t('actGarageOpen')); playAsset('doorOpen');
        }});
        else actions.push({ text: t('actCodeLock'), action:()=> setText(t('actCodeLockDesc')) });
      } else {
        actions.push({ text: t('actRunGarage'), cls:'item-action', action:()=>{
          playAsset('escape'); winGame();
        }});
      }
    } break;
  }
  return actions;
}

// ============================================================
//  UI
// ============================================================
const $ = id => document.getElementById(id);

function render() {
  const room = tRoom(state.room);
  const bg = $('room-bg');
  const imgUrl = ASSETS.roomImages[state.room];
  bg.style.backgroundImage = imgUrl ? `url('${imgUrl}')` : 'none';
  bg.style.backgroundColor = imgUrl ? '' : getRoomColor(state.room);
  $('room-label').textContent = room.name;
  $('scene-text').innerHTML = `<div class="fade-in"><p>${room.desc}</p></div>`;
  buildActions();
  updateInventory();
  updateNoise();
  updateGrannyIndicator();
}

function buildActions() {
  const actDiv = $('actions');
  actDiv.innerHTML = '';
  for (const [target, exitKey] of Object.entries(ROOM_EXITS[state.room])) {
    const row = document.createElement('div');
    row.className = 'exit-row';

    const btn = document.createElement('button');
    btn.innerHTML = icon('door') + ' ' + tExit(exitKey);
    btn.onclick = () => goRoom(target);

    const listenBtn = document.createElement('button');
    listenBtn.className = 'listen-btn';
    listenBtn.innerHTML = icon('ear');
    listenBtn.title = t('listenBtn');
    listenBtn.onclick = () => {
      const roomName = tRoom(target).name;
      const adjToTarget = Object.keys(ROOM_EXITS[target] || {}).filter(r => r !== state.room);
      if (state.grannyRoom === target) {
        playAsset('footsteps', 1500, 0.4);
        setText(t('listenDanger')(roomName));
      } else if (adjToTarget.includes(state.grannyRoom)) {
        playAsset('footsteps', 1500, 0.12);
        setText(t('listenNear')(roomName));
      } else {
        setText(t('listenSafe')(roomName));
      }
    };

    row.appendChild(btn);
    row.appendChild(listenBtn);
    actDiv.appendChild(row);
  }
  for (const a of getRoomActions(state.room)) {
    const btn = document.createElement('button');
    btn.innerHTML = a.text;
    if (a.cls) btn.className = a.cls;
    btn.onclick = () => { a.action(); buildActions(); };
    actDiv.appendChild(btn);
  }
  const hideBtn = document.createElement('button');
  hideBtn.innerHTML = t('actHide');
  hideBtn.onclick = () => doHide();
  actDiv.appendChild(hideBtn);

  if (ysdk) {
    const adBtn = document.createElement('button');
    adBtn.textContent = t('actWatchAd');
    adBtn.style.borderColor = '#555';
    adBtn.style.color = '#888';
    adBtn.onclick = () => {
      showRewardedAd(() => {
        state.timeLeft = Math.min(300, state.timeLeft + 60);
        setText('<span class="event">' + t('actAdRewarded') + '</span>');
      });
    };
    actDiv.appendChild(adBtn);
  }
}

function getRoomColor(id) {
  const c = { bedroom:'#140c1e',hallway:'#0e0c18',kitchen:'#120e16',living:'#100c1a',
    bathroom:'#0c0e1a',attic:'#120e18',basement:'#0a0a12',garage:'#0c0a14' };
  return c[id]||'#0e0c12';
}

function setText(html, cls) {
  const el = $('scene-text');
  const div = document.createElement('div');
  div.className = 'fade-in';
  if (cls) div.classList.add(cls);
  div.innerHTML = `<p>${html}</p>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function addItem(key) {
  if (!state.inventory.includes(key)) {
    state.inventory.push(key);
    playAsset('itemPickup');
    updateInventory();
  }
}

function updateInventory() {
  $('inventory-panel').innerHTML = state.inventory.map(k => `<span>${t(k)}</span>`).join('');
  $('inventory-count').innerHTML = icon('items') + ` ${state.inventory.length} ${t('items')}`;
}

// ============================================================
//  ШУМ
// ============================================================
function addNoise(n) {
  const before = state.noise;
  state.noise = Math.min(100, state.noise + n);
  updateNoise();

  if (before < 40 && state.noise >= 40) {
    setText('<span class="danger">' + t('noiseWarning40') + '</span>');
  } else if (before < 60 && state.noise >= 60) {
    setText('<span class="danger">' + t('noiseWarning60') + '</span>');
  } else if (before < 80 && state.noise >= 80) {
    setText('<span class="danger">' + t('noiseWarning80') + '</span>');
  }

  checkGrannyNoise();
}

function updateNoise() {
  $('noise-fill').style.width = state.noise + '%';
}

let noiseDecayInterval;
function startNoiseDecay() {
  noiseDecayInterval = setInterval(() => {
    if (state.dead || state.escaped || state.paused) return;
    if (state.noise > 0) {
      state.noise = Math.max(0, state.noise - 3);
      updateNoise();
    }
  }, 2000);
}

function checkGrannyNoise() {
  if (state.noise >= 80) {
    state.grannyAlert = Math.min(3, state.grannyAlert + 1);
  } else if (state.noise >= 55) {
    if (Math.random() < 0.35) state.grannyAlert = Math.min(3, state.grannyAlert + 1);
  } else if (state.noise >= 35) {
    if (Math.random() < 0.15) state.grannyAlert = Math.min(2, state.grannyAlert + 1);
  }
  updateGrannyIndicator();
}

// ============================================================
//  ПЕРЕМЕЩЕНИЕ
// ============================================================
function goRoom(target) {
  if (target === 'basement' && !state.inventory.includes('basementKey')) {
    playAsset('doorLocked'); setText('<span class="danger">'+t('lockedBasement')+'</span>'); return;
  }
  if (target === 'attic' && !state.inventory.includes('atticKey')) {
    playAsset('doorLocked'); setText('<span class="danger">'+t('lockedAttic')+'</span>'); return;
  }

  state.room = target;
  state.moves++;
  playAsset('doorOpen');
  addNoise(5);

  if (state.grannyRoom === target) { grannyAttack(); return; }
  render();

  if (Math.random() < 0.25) {
    setTimeout(()=>{ playAsset('creak'); setText('<span class="danger">'+t('creakMsg')+'</span>'); }, 1500);
  }
}

// ============================================================
//  ПРЯТАТЬСЯ
// ============================================================
function doHide() {
  const grannyNear = isGrannyAdjacent();
  const alert = state.grannyAlert;

  state.noise = Math.max(0, state.noise - 40);
  updateNoise();

  if (grannyNear || alert >= 2) {
    retreatGranny();
    state.grannyAlert = Math.max(0, state.grannyAlert - 2);
    const msgs = alert >= 2 ? t('hideAlert') : t('hideNear');
    setText('<span class="event">' + pick(msgs) + '</span>');
  } else {
    state.grannyAlert = Math.max(0, state.grannyAlert - 1);
    setText('<span class="event">' + pick(t('hideSafe')) + '</span>');
  }

  state.timeLeft = Math.max(0, state.timeLeft - 4);
  updateGrannyIndicator();
}

function isGrannyAdjacent() {
  const exits = Object.keys(ROOM_EXITS[state.room]);
  return exits.includes(state.grannyRoom) || state.grannyRoom === state.room;
}

const DEAD_ENDS = ['basement', 'attic', 'garage'];

function nextStepToward(from, to) {
  if (from === to) return null;
  const visited = new Set([from]);
  const queue = [[from, null]];
  while (queue.length) {
    const [cur, first] = queue.shift();
    for (const next of Object.keys(ROOM_EXITS[cur] || {})) {
      const step = first !== null ? first : next;
      if (next === to) return step;
      if (!visited.has(next)) { visited.add(next); queue.push([next, step]); }
    }
  }
  return null;
}

function retreatGranny() {
  const exits = Object.keys(ROOM_EXITS[state.grannyRoom] || {});
  const playerAdj = Object.keys(ROOM_EXITS[state.room] || {});
  const safe = exits.filter(r => r !== state.room && !playerAdj.includes(r) && !DEAD_ENDS.includes(r));
  const safeAny = exits.filter(r => r !== state.room && !playerAdj.includes(r));
  const fallback = exits.filter(r => r !== state.room && !DEAD_ENDS.includes(r));
  const chosen = safe.length ? safe : safeAny.length ? safeAny : fallback.length ? fallback : exits.filter(r => r !== state.room);
  if (chosen.length) state.grannyRoom = pick(chosen);
}

// ============================================================
//  ИНДИКАТОР СБОРЩИКА
// ============================================================
function updateGrannyIndicator() {
  const el = $('granny-status'); if (!el) return;
  const near = isGrannyAdjacent();
  const a = state.grannyAlert;
  if (near) { el.innerHTML = icon('nearby') + ' ' + t('statusNear'); el.style.color = '#b14fff'; }
  else if (a >= 2) { el.innerHTML = icon('search') + ' ' + t('statusSearch'); el.style.color = '#cc6600'; }
  else if (a >= 1) { el.innerHTML = icon('ear') + ' ' + t('statusAlert'); el.style.color = '#aa8800'; }
  else { el.innerHTML = icon('unaware') + ' ' + t('statusSleep'); el.style.color = '#556655'; }
}

// ============================================================
//  СБОРЩИК — ИИ
// ============================================================
let grannyMoveInterval;
function startGrannyAI() {
  grannyMoveInterval = setInterval(() => {
    if (state.dead || state.escaped || state.paused) return;

    const alert = state.grannyAlert;
    const exits = Object.keys(ROOM_EXITS[state.grannyRoom] || {});
    if (!exits.length) return;

    const inDeadEnd = DEAD_ENDS.includes(state.grannyRoom);
    const moveChance = inDeadEnd ? 0.75
                     : alert >= 3 ? 0.85
                     : alert >= 2 ? 0.55
                     : alert >= 1 ? 0.30
                     : 0.12;

    if (Math.random() > moveChance) {
      if (alert > 0 && Math.random() < 0.25) {
        state.grannyAlert = Math.max(0, alert - 1);
        updateGrannyIndicator();
      }
      const playerAdj0 = Object.keys(ROOM_EXITS[state.room] || {});
      const isNearPlayer = playerAdj0.includes(state.grannyRoom) || state.grannyRoom === state.room;
      const creakChance = isNearPlayer ? 0.55 : 0.20;
      if (Math.random() < creakChance) {
        playAsset('creak', null, isNearPlayer ? 0.18 : 0.07);
      }
      return;
    }

    const safeExits = exits.filter(r => !DEAD_ENDS.includes(r));
    const playerAdj = Object.keys(ROOM_EXITS[state.room] || {});
    let next;

    if (alert >= 3) {
      const toward = nextStepToward(state.grannyRoom, state.room);
      next = (toward && Math.random() < 0.9) ? toward : pick(exits);
    } else if (alert >= 2) {
      const toward = nextStepToward(state.grannyRoom, state.room);
      const approaching = exits.filter(r => playerAdj.includes(r) && r !== state.room);
      if (toward && Math.random() < 0.60) next = toward;
      else if (approaching.length && Math.random() < 0.40) next = pick(approaching);
      else next = pick(safeExits.length ? safeExits : exits);
    } else if (alert >= 1) {
      const toward = nextStepToward(state.grannyRoom, state.room);
      next = (toward && Math.random() < 0.30) ? toward : pick(safeExits.length ? safeExits : exits);
    } else {
      next = pick(safeExits.length ? safeExits : exits);
    }

    if (!next) return;
    state.grannyRoom = next;

    if (next === state.room) { grannyAttack(); return; }

    if (playerAdj.includes(next)) {
      if (alert >= 2) {
        playAsset('footsteps', 1500, 0.4);
        setText('<span class="danger">' + pick(t('grannyNearby')) + ' [' + tRoom(next).name + ']</span>');
      } else {
        playAsset('footsteps', 1500, 0.12);
        setText('<span class="danger">' + pick(t('grannyFar')) + ' [' + tRoom(next).name + ']</span>');
      }
    }

    updateGrannyIndicator();
  }, 7000);
}

function grannyAttack() {
  if (state.dead || state.escaped) return;
  state.dead = true;
  gameplayStop();
  showCollapse(() => gameOver());
}

// ============================================================
//  ПОГЛОЩЕНИЕ ТУМАНОМ (вместо скримера)
// ============================================================
function showCollapse(cb) {
  const el = $('flash');
  el.classList.add('active');
  playAsset('collapse');
  setTimeout(()=>{ el.classList.remove('active'); cb(); }, 1500);
}

// ============================================================
//  КОНЕЦ ИГРЫ
// ============================================================
function gameOver() {
  clearAllIntervals();
  $('end-title').textContent = t('caughtTitle');
  $('end-title').style.color = 'var(--accent-glow)';
  $('end-text').textContent = t('caughtText');
  $('end-screen').classList.add('active');
}

function timeUp() {
  state.dead = true;
  gameplayStop();
  showCollapse(() => {
    clearAllIntervals();
    $('end-title').textContent = t('caughtTitle');
    $('end-title').style.color = 'var(--accent-glow)';
    $('end-text').textContent = t('timeUpText');
    $('end-screen').classList.add('active');
  });
}

function winGame() {
  state.escaped = true;
  clearAllIntervals();
  gameplayStop();
  $('game').classList.remove('active');
  $('end-title').textContent = t('winTitle');
  $('end-title').style.color = '#4a4';
  const elapsed = 300 - state.timeLeft;
  const min = Math.floor(elapsed / 60);
  const sec = String(elapsed % 60).padStart(2, '0');
  $('end-text').textContent = t('winText')(min, sec, state.inventory.length);
  $('end-screen').classList.add('active');
  submitLeaderboard(elapsed);
  savePlayerBestTime(elapsed);
}

function restartWithAd() {
  showInterstitialAd().then(() => location.reload());
}

function clearAllIntervals() {
  clearInterval(timerInterval);
  clearInterval(grannyMoveInterval);
  clearInterval(noiseDecayInterval);
  stopAmbient();
}

// ============================================================
//  ТАЙМЕР
// ============================================================
let timerInterval;
function startTimer() {
  timerInterval = setInterval(()=>{
    if (state.dead || state.escaped || state.paused) return;
    state.timeLeft--;
    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;
    $('timer-display').textContent = `${m}:${String(s).padStart(2,'0')}`;
    if (state.timeLeft <= 60) $('timer-display').style.color = '#ff3030';
    if (state.timeLeft <= 0) timeUp();
  }, 1000);
}

// ============================================================
//  СТАРТ
// ============================================================
function startGame() {
  state = freshState();
  $('menu-screen').classList.add('hidden');
  $('game').classList.add('active');
  ensureAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  gameplayStart();
  startAmbient();
  startTimer();
  startGrannyAI();
  startNoiseDecay();
  render();
  setText(t('intro'));
}

// ============================================================
//  п.1.6.2.7: блокируем выделение, перетаскивание и контекстное меню
// ============================================================
['contextmenu','selectstart','dragstart','gesturestart'].forEach(ev => {
  document.addEventListener(ev, e => e.preventDefault());
});

// ============================================================
//  п.1.3: ставим звук И игру на паузу при сворачивании/смене вкладки
// ============================================================
function onPageHidden() {
  if (state && (state.dead || state.escaped)) { suspendAudio(); return; }
  pauseGame();
}
function onPageVisible() {
  resumeGame();
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) onPageHidden(); else onPageVisible();
});
window.addEventListener('pagehide', onPageHidden);
window.addEventListener('blur', () => { if (document.hidden) onPageHidden(); });

// ============================================================
//  ЗАГРУЗКА
// ============================================================
async function boot() {
  applyLang();
  await initYSDK();
  applyLang();
  try { await loadSoundAssets(); } catch(e) { console.warn('Audio load error:', e); }
  // Предзагрузка изображений комнат
  Object.values(ASSETS.roomImages).filter(Boolean).forEach(src => { const img = new Image(); img.src = src; });
  // Game Ready API — сообщаем, что игра загружена и готова к показу
  notifyGameReady();
}
boot();
</script>
